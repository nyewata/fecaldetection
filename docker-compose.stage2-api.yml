services:
    stage-2-api:
        build:
            context: api/stage2/
            dockerfile: Dockerfile
        container_name: fecal-detection-stage-2-api
        command: uvicorn app:app --host 0.0.0.0 --port 7138 --reload
        ports:
            - "7138:7138"
        environment:
            MODELS_DIR: /app/models
        restart: unless-stopped
